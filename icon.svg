<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mirage app icon — editable source.
  PNG variants are generated from this file (or via build/generate_icon.ps1).
  Design: rounded square, indigo→violet diagonal gradient, bold white "M".
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2963"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>
  <text x="512" y="730" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="720" font-weight="800" text-anchor="middle"
        fill="#FFFFFF" filter="url(#soft)">M</text>
</svg>
